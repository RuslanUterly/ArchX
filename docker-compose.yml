services:
  postgres:
    image: postgres:17-alpine
    container_name: archx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archx}
      POSTGRES_USER: ${POSTGRES_USER:-archx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archx_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archx} -d ${POSTGRES_DB:-archx}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ArchX.Server/Dockerfile
    container_name: archx-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-archx};Username=${POSTGRES_USER:-archx};Password=${POSTGRES_PASSWORD:-archx_password}
      JwtOptions__SecretKey: ${JWT_SECRET:-CHANGE_THIS_SECRET_32_PLUS_CHARS_LONG}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: archx-frontend
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

  caddy:
    image: caddy:2.10-alpine
    container_name: archx-caddy
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      - frontend
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
